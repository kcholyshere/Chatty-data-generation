services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: chatty
      POSTGRES_PASSWORD: chatty
      POSTGRES_DB: chatty
    ports:
      # Bind to localhost only so the database is not reachable from other hosts on the network.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatty"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      GOOGLE_CLOUD_PROJECT: gd-gcp-gridu-genai
      GOOGLE_CLOUD_LOCATION: global
      GEMINI_MODEL: gemini-3.5-flash
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json
      # Langfuse observability — substituted from the project .env (empty = tracing disabled).
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: chatty
      POSTGRES_USER: chatty
      POSTGRES_PASSWORD: chatty
    volumes:
      # Mount host Application Default Credentials so the app can authenticate to Vertex AI.
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/adc.json:ro

volumes:
  pgdata:
